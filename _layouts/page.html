---
layout: default
---
{% if page.banner_variant %}
<div class="page-banner">
  {% include banner-graphic.html variant=page.banner_variant %}
</div>
{% endif %}
<article class="section">
  <div class="container prose">
    {% if page.eyebrow %}<div class="eyebrow">{{ page.eyebrow }}</div>{% endif %}
    <h1>{{ page.title }}</h1>
    {{ content }}
  </div>
</article>
