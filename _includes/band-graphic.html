{% if include.kind == "dark" %}
<div class="band-graphic--dark">
  <div class="blob-cream"></div>
  <div class="stripe-trio"><span class="l1"></span><span class="l2"></span><span class="l3"></span></div>
</div>
{% else %}
<div class="band-graphic--light">
  <div class="blob-dark-sm"></div>
  <div class="stripe-trio"><span class="l1"></span><span class="l2"></span><span class="l3"></span></div>
</div>
{% endif %}
